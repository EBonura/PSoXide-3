[package]
name         = "psx-sdk"
version      = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description  = "PSoXide SDK umbrella crate. Re-exports the per-subsystem crates."

[dependencies]
psx-hw  = { workspace = true }
psx-io  = { path = "../psx-io" }
psx-rt  = { path = "../psx-rt" }
psx-gpu = { path = "../psx-gpu" }
psx-gte = { path = "../psx-gte" }
psx-pad = { path = "../psx-pad" }

[features]
default = []
# Forward the rt::alloc feature.
alloc = ["psx-rt/alloc"]

[lints.rust]
missing_docs = "warn"
