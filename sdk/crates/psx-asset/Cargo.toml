[package]
name    = "psx-asset"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Runtime parsers for PSoXide cooked-asset blobs. Consumes the binary layouts defined in `psxed-format`; produced by the host editor's `psxed` CLI."

[dependencies]
psxed-format = { path = "../../../editor/crates/psxed-format" }
psx-gte      = { path = "../psx-gte" }

[lints.rust]
missing_docs = "warn"
