[package]
name         = "psx-rt"
version      = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description  = "PS1 bare-metal runtime: _start, BIOS calls, panic, heap."

[dependencies]
psx-hw = { workspace = true }
psx-io = { path = "../psx-io" }

[features]
default = []
# Expose a bump allocator as the global allocator. Kept optional so a
# minimal no-heap homebrew can opt out.
alloc = []

[lints.rust]
missing_docs = "warn"
