[package]
name    = "showcase-textured-sprite"
version = "0.1.0"
edition = "2021"

[workspace]

[[bin]]
name = "showcase-textured-sprite"
path = "src/main.rs"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true

[dependencies]
psx-gpu  = { path = "../../crates/psx-gpu" }
psx-hw   = { path = "../../../crates/psx-hw" }
psx-io   = { path = "../../crates/psx-io" }
psx-rt   = { path = "../../crates/psx-rt" }
psx-vram = { path = "../../crates/psx-vram" }
