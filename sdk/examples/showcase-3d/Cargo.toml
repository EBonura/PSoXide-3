[package]
name    = "showcase-3d"
version = "0.1.0"
edition = "2021"

[workspace]

[[bin]]
name = "showcase-3d"
path = "src/main.rs"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true

[dependencies]
psx-font = { path = "../../crates/psx-font" }
psx-fx   = { path = "../../crates/psx-fx" }
psx-gpu  = { path = "../../crates/psx-gpu" }
psx-gte  = { path = "../../crates/psx-gte" }
psx-rt   = { path = "../../crates/psx-rt" }
psx-vram = { path = "../../crates/psx-vram" }
