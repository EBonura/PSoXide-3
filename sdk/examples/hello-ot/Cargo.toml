[package]
name    = "hello-ot"
version = "0.1.0"
edition = "2021"
license = "GPL-2.0-or-later"

[workspace]

[[bin]]
name = "hello-ot"
path = "src/main.rs"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true

[dependencies]
psx-gpu  = { path = "../../crates/psx-gpu" }
psx-math = { path = "../../crates/psx-math" }
psx-rt   = { path = "../../crates/psx-rt" }
